# ===========================================
# PostgreSQL 16 — tuned for 4 GB RAM VPS
# ===========================================

listen_addresses = '*'
port = 5432

# --- Connection ---
max_connections = 100

# --- Memory (4 GB total, ~2.5 GB for PG) ---
shared_buffers = 1GB
effective_cache_size = 3GB
work_mem = 16MB
maintenance_work_mem = 256MB

# --- WAL ---
wal_buffers = 16MB
min_wal_size = 256MB
max_wal_size = 1GB
checkpoint_completion_target = 0.9

# --- Planner ---
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 100

# --- Logging ---
log_min_duration_statement = 500
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_timezone = 'UTC'

# --- Locale ---
timezone = 'UTC'
lc_messages = 'en_US.utf8'

# --- SSL (connections from Vercel over public internet) ---
ssl = on
ssl_cert_file = '/var/lib/postgresql/server.crt'
ssl_key_file = '/var/lib/postgresql/server.key'
