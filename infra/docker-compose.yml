services:

  # ─── Database (private, no public ports) ───────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf -c hba_file=/etc/postgresql/pg_hba.conf
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    shm_size: "256mb"

  # ─── Cache (private, no public ports) ──────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── ImobIntel API (Next.js on VPS) ───────────────────────
  imobintel-api:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: "postgresql://${IMOBINTEL_APP_USER:-imobintel}:${IMOBINTEL_APP_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
      - web
    # 127.0.0.1: Alpine "localhost" → ::1 while Node listens on IPv4 → refused
    # /api/health/live: fast 200 without DB/Stripe/Resend (deep check stays at /api/health)
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/api/health/live || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 12
      start_period: 60s

  # ─── Reverse proxy (public: 80, 443) ──────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file: .env
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web
    depends_on:
      imobintel-api:
        condition: service_started

  # ─── Uptime monitor ───────────────────────────────────────
  uptime-kuma:
    image: louislam/uptime-kuma:1
    restart: unless-stopped
    volumes:
      - uptime_data:/app/data
    networks:
      - internal
      - web
    profiles:
      - monitoring

  # ─── Backup (on-demand via --profile backup) ──────────────
  backup:
    image: postgres:16-alpine
    restart: "no"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./scripts:/scripts:ro
      - ${BACKUP_DIR:-./backups}:/backups
    entrypoint: /scripts/backup.sh
    networks:
      - internal
    profiles:
      - backup

networks:
  internal:
    driver: bridge
  web:
    driver: bridge

volumes:
  pg_data:
  redis_data:
  caddy_data:
  caddy_config:
  uptime_data:
